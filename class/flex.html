            <p class="para">Paragraphs are the building blocks of papers. Many students define paragraphs in terms of length: a paragraph is a group of at least five sentences, a paragraph is half a page long, etc. In reality, though, the unity and coherence of ideas among sentences is what constitutes a paragraph. A paragraph is defined as “a group of sentences or a single sentence that forms a unit” (Lunsford and Connors 116). Length and appearance do not determine whether a section in a paper is a paragraph. For instance, in some styles of writing, particularly journalistic styles, a paragraph can be just one sentence long. Ultimately, a paragraph is a sentence or group of sentences that support one main idea. In this handout, we will refer to this as the “controlling idea,” because it controls what happens in the rest of the paragraph.</p>

<head>

    <title>Document</title>
    <style>
        .parent{
            display:grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows:100px 200px 300px;
            gap: 20px;
        }
        .child{
            background-color: blue;
            color: white;
            font-size: 40px;
            display:grid;
            place-items: center;
            justify-content: center;
        }
        #box1{
            /*grid-column-start: 1;
            grid-column-end: 3;*/
            grid-column: span 3;
          
        }
        #box2{
            grid-row: span 2;
        }
        #box3{
            grid-column: span 2;
        }
    </style>

</head>

    <div class="parent">
        <div class="child" id="box1"> 1</div>
        <div class="child" id="box2"> 2</div>
        <div class="child" id="box3"> 3</div>
        <div class="child" id="box4"> 4</div>
        <div class="child" id="box5"> 5</div>
